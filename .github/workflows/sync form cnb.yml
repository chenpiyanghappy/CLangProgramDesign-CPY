# .github/workflows/sync-cnb.yml
name: Sync from CNB
on:
  schedule:
    - cron: "0 1 * * *"  # 每天1点执行，可自己改时间

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Sync from CNB Repository
        uses: docker://tencentcom/git-sync
        env:
          PLUGIN_TARGET_URL: "https://cnb.cool/Chenpiyang_Software_DEV/CLangProgramDesign-CPY.git"  # 替换成你的CNB仓库地址
          PLUGIN_AUTH_TYPE: "https"
          PLUGIN_USERNAME: "cnb"
          PLUGIN_PASSWORD: ${{ secrets.GIT_PASSWORD }}  # CNB的访问令牌放GitHub Secrets里
          PLUGIN_SYNC_MODE: "pull"
